<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aurora Codex - Entrar</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Imagem de fundo cinematográfica de biblioteca -->
    <div class="cinema-background"></div>

    <div class="background-overlay">
        <header class="login-header">
            <h1 class="brand-logo">AURORA CODEX</h1>
        </header>

        <main class="login-container">
            <div class="login-card animate-fade-in">
                <h2>Entrar no Portal</h2>
                <p class="subtitle">Descubra universos, conecte histórias e explore o Oráculo.</p>
                
                <button id="btn-google-login" class="btn-google">
                    <img src="https://lh3.googleusercontent.com/COxitRowZbgHe2365vVx1bi1vMvJQ75ALwN7S96v6vU78S799VJWw759FwB-39bICw" alt="Google Logo" class="google-icon">
                    Entrar com o Google
                </button>

                <div class="login-help">
                    <p>Novo por aqui? O acesso à plataforma é restrito e exige aprovação do administrador para a segurança e privacidade das obras.</p>
                </div>
            </div>
        </main>

        <footer class="login-footer">
            <p>&copy; 2026 Aurora Codex - Uso Pessoal e Restrito.</p>
        </footer>
    </div>

    <script type="module" src="js/auth.js"></script>
</body>
</html>
