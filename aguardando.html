<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aurora Codex - Acesso Pendente</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="cinema-background"></div>

    <div class="background-overlay">
        <header class="login-header">
            <h1 class="brand-logo">AURORA CODEX</h1>
        </header>

        <main class="login-container">
            <div class="login-card text-center animate-fade-in">
                <!-- Ícone sutil de ampulheta/espera -->
                <div class="status-icon">⏳</div>
                
                <h2>Acesso em Análise</h2>
                <p class="subtitle">Olá! Identificamos seu login com a Conta Google, mas seu perfil ainda não foi ativado.</p>
                
                <div class="waiting-box">
                    <p>Solicitação enviada ao administrador do <strong>Aurora Codex</strong>.</p>
                    <p class="highlight-text">Por favor, aguarde a liberação do seu perfil (Leitor ou Autor).</p>
                </div>

                <button onclick="window.location.href='index.html'" class="btn-secondary">
                    Voltar para o Login
                </button>
            </div>
        </main>

        <footer class="login-footer">
            <p>&copy; 2026 Aurora Codex - Uso Pessoal e Restrito.</p>
        </footer>
    </div>
</body>
</html>
