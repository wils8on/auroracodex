<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aurora Codex - Gerenciar Livros</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .autor-container { max-width: 800px; margin: 100px auto; padding: 0 20px; }
        .autor-title { font-family: 'Cinzel', serif; color: #FFF; margin-bottom: 30px; letter-spacing: 1px; }
        .form-wrapper { background-color: rgba(0, 0, 0, 0.6); border: 1px solid rgba(255,255,255,0.05); border-radius: 8px; padding: 30px; backdrop-filter: blur(8px); }
        .form-group { margin-bottom: 20px; display: flex; flex-direction: column; gap: 8px; }
        .form-group label { color: #8C8C8C; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.5px; }
        .form-group input, .form-group textarea, .form-group select { background-color: #1A1A1A; color: #FFF; border: 1px solid #404040; padding: 12px; border-radius: 4px; font-family: inherit; font-size: 0.95rem; }
        .form-group input:focus, .form-group textarea:focus, .form-group select:focus { border-color: #E50914; outline: none; }
        .btn-submit { background-color: #E50914; color: #FFF; border: none; padding: 14px; border-radius: 4px; font-weight: 600; cursor: pointer; transition: background 0.2s; font-size: 1rem; margin-top: 10px; }
        .btn-submit:hover { background-color: #B81D24; }
    </style>
</head>
<body>

    <!-- Menu Superior do Autor -->
    <nav class="navbar nav-black">
        <div class="nav-left">
            <h1 class="nav-logo" style="cursor:pointer;" onclick="window.location.href='../dashboard.html'">AURORA CODEX</h1>
            <ul class="nav-links">
                <li><a href="../dashboard.html">Voltar ao Portal</a></li>
                <li class="active"><a href="#">Meus Livros</a></li>
            </ul>
        </div>
    </nav>

    <main class="autor-container animate-fade-in">
        <h2 class="autor-title">Cadastrar Nova Obra</h2>
        
        <div class="form-wrapper">
            <form id="form-cadastrar-livro">
                <div class="form-group">
                    <label for="titulo">Título do Livro</label>
                    <input type="text" id="titulo" placeholder="Ex: Labirinto de Vidro" required>
                </div>

                <div class="form-group">
                    <label for="universo">Universo Conectado</label>
                    <select id="universo" required>
                        <option value="">Selecione o Universo...</option>
                        <option value="original">Universo Original</option>
                        <option value="vampire-diaries">The Vampire Diaries (Fanfiction)</option>
                        <option value="50-shades">50 Shades of Grey (Fanfiction)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="url-capa">URL da Imagem da Capa (Horizontal)</label>
                    <input type="url" id="url-capa" placeholder="https://exemplo.com/imagem.jpg" required>
                </div>

                <div class="form-group">
                    <label for="sinopse">Sinopse da Obra</label>
                    <textarea id="sinopse" rows="5" placeholder="Escreva a sinopse ou introdução marcante do livro..." required></textarea>
                </div>

                <button type="submit" class="btn-submit">Publicar no Codex</button>
            </form>
        </div>

        <!-- Nova seção para gerenciar os livros existentes -->
        <h2 class="autor-title" style="margin-top: 50px;">Suas Obras Cadastradas</h2>
        <div class="form-wrapper" style="overflow-x: auto;">
            <table style="width: 100%; border-collapse: collapse; text-align: left; color: #FFF;">
                <thead>
                    <tr style="border-bottom: 1px solid rgba(255,255,255,0.1); color: #8C8C8C; font-size: 0.85rem;">
                        <th style="padding: 12px;">Capa</th>
                        <th style="padding: 12px;">Título</th>
                        <th style="padding: 12px;">Universo</th>
                        <th style="padding: 12px; text-align: right;">Ações</th>
                    </tr>
                </thead>
                <tbody id="tabela-gerenciar-livros">
                    <!-- Preenchido dinamicamente via JS -->
                </tbody>
            </table>
        </div>
    </main>

    <!-- Script de Integração com o Banco -->
    <script type="module" src="../js/autor.js"></script>
</body>
</html>
